openapi: 3.0.0
info:
  title: Snapify API
  version: 1.1.0
  description: >
    API Documentation for Snapify Backend. Includes endpoints for
    Authentication, Users, Notes, Folders, and Batch PDFs.

servers:
  - url: https://snapify-api-tdn8.onrender.com/api
    description: Production Server (Render)
  - url: http://localhost:3000/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Operation successful
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
    Note:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        folderId:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, ACTIONED, ARCHIVED]
    Folder:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [MANUAL, SMART]
    BatchDocument:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        pdfUrl:
          type: string
        folderId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

security:
  - bearerAuth: []

paths:
  # ====================================================
  # 1. AUTHENTICATION ROUTES
  # ====================================================
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName]
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: snapify123
                displayName:
                  type: string
                  example: John Doe
      responses:
        "201":
          description: User registered successfully

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login to the system
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: snapify123
      responses:
        "200":
          description: Login successful, returns JWT token

  # ====================================================
  # 2. USER ROUTES
  # ====================================================
  /users/profile:
    get:
      tags: [Users]
      summary: Get user profile
      responses:
        "200":
          description: Successful operation
    put:
      tags: [Users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                avatarUrl:
                  type: string
      responses:
        "200":
          description: Profile updated successfully

  # ====================================================
  # 3. NOTES ROUTES
  # ====================================================
  /notes/snap:
    post:
      tags: [Notes]
      summary: Snap-to-Note (Upload image)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Image processed and Note created successfully

  /notes/search:
    get:
      tags: [Notes]
      summary: Search notes by keyword
      parameters:
        - in: query
          name: q
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Successful operation

  /notes:
    get:
      tags: [Notes]
      summary: Get list of notes
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, ACTIONED, ARCHIVED]
      responses:
        "200":
          description: Successful operation
    post:
      tags: [Notes]
      summary: Create a manual note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: Meeting Notes
                content:
                  type: string
                  example: Discussed Q3 roadmap...
                folderId:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Note created successfully

  /notes/{id}:
    get:
      tags: [Notes]
      summary: Get note details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
    put:
      tags: [Notes]
      summary: Update a note
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Note"
      responses:
        "200":
          description: Note updated successfully
    delete:
      tags: [Notes]
      summary: Delete a note
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Note deleted successfully

  /notes/{id}/categorize:
    post:
      tags: [Notes - AI]
      summary: Auto Categorize Note
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Note categorized successfully

  /notes/{id}/actions:
    get:
      tags: [Notes - AI]
      summary: Get Smart Actions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation

  # ====================================================
  # 4. FOLDERS ROUTES
  # ====================================================
  /folders:
    get:
      tags: [Folders]
      summary: Get user folders
      responses:
        "200":
          description: Successful operation
    post:
      tags: [Folders]
      summary: Create a new folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: October Receipts
                description:
                  type: string
      responses:
        "201":
          description: Folder created successfully

  /folders/{id}:
    get:
      tags: [Folders]
      summary: Get folder details (Includes notes list)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
    put:
      tags: [Folders]
      summary: Update folder details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Folder updated successfully
    delete:
      tags: [Folders]
      summary: Delete a folder (Moves notes to unassigned)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Folder deleted successfully

  # ====================================================
  # 5. BATCHES (PDF SCANNER) ROUTES
  # ====================================================
  /batches/scan:
    post:
      tags: [Batches (PDF Scanner)]
      summary: Document Scanner (Upload multiple images -> 1 PDF)
      description:
        Upload an array of images (max 20). The system will check file
        signatures, convert them into a single PDF, and upload it to Cloudflare
        R2.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Array of image files (JPG, PNG)
                title:
                  type: string
                  example: Hợp đồng thuê nhà 2026
      responses:
        "201":
          description: PDF generated and saved successfully

  /batches:
    get:
      tags: [Batches (PDF Scanner)]
      summary: Get list of all PDFs
      responses:
        "200":
          description: Successful operation

  /batches/{id}:
    put:
      tags: [Batches (PDF Scanner)]
      summary: Update PDF metadata (Rename or Move to Folder)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Đổi tên Hợp đồng mới
                folderId:
                  type: string
                  nullable: true
      responses:
        "200":
          description: PDF updated successfully
    delete:
      tags: [Batches (PDF Scanner)]
      summary: Delete a PDF document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF deleted successfully
